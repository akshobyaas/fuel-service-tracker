{% extends 'trk/base.html' %}

{% block content %}

<div class="container">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>Vehicles</h2>

<a href="/add-vehicle/" class="btn btn-primary">
Add Vehicle
</a>

</div>

<div class="row">

{% for v in vehicles %}

<div class="col-xl-3 col-lg-4 col-md-6 col-sm-12 mb-4">

<div class="card shadow-sm h-100">

<div class="card-body">

<h5 class="card-title">
{{ v.brand }} {{ v.name }}
</h5>

<p class="card-text">

<strong>Year:</strong> {{ v.year }} <br>
<strong>Fuel:</strong> {{ v.fuel_type }}

</p>

<div class="d-flex gap-2">

<a href="/edit-vehicle/{{ v.id }}" class="btn btn-warning btn-sm">
Edit
</a>

<a href="/delete-vehicle/{{ v.id }}" 
class="btn btn-danger btn-sm"
onclick="return confirm('Are you sure you want to delete this vehicle?')">
Delete
</a>

</div>

</div>

</div>

</div>

{% endfor %}

</div>

<a href="/" class="btn btn-secondary mt-3">
Back Home
</a>

</div>

{% endblock %}
