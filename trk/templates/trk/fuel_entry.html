{% extends 'trk/base.html' %}

{% block content %}

<div class="container">

<h2 class="mb-4">Add Fuel Entry</h2>
{% if error %}
<div class="alert alert-danger">
{{ error }}
</div>
{% endif %}
<div class="card shadow-sm p-4 col-lg-6 col-md-8">

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Vehicle</label>

<select name="vehicle" class="form-select" required>

{% for v in vehicles %}
<option value="{{ v.id }}">
{{ v.brand }} {{ v.name }}
</option>
{% endfor %}

</select>
</div>


<div class="alert alert-info d-flex align-items-center mb-3">

<input 
type="checkbox"
class="form-check-input me-3"
name="full_tank"
id="fullTank"
style="transform:scale(1.4);"
>

<div>

<label class="form-check-label fw-semibold" for="fullTank">
Full Tank
</label>

<div class="small text-muted">
Check this only when the tank is filled completely.
Mileage is calculated between full tank fills.
</div>

</div>

</div>


<div class="mb-3">

<label class="form-label">Fuel (Litres)</label>

<input type="number"
step="0.01"
name="litres"
class="form-control"
placeholder="Enter fuel in litres"
required>

</div>


<div class="mb-3">

<label class="form-label">Fuel Cost</label>

<input type="number"
step="0.01"
name="cost"
class="form-control"
placeholder="Enter fuel cost"
required>

</div>


<div class="mb-3">

<label class="form-label">Odometer Reading</label>

<input type="number"
step="0.1"
name="odometer"
class="form-control"
placeholder="Enter odometer reading"
required>

</div>


<div class="mb-3">

<label class="form-label">Date</label>

<input type="date" name="date" class="form-control" value="{{ today|default:'' }}" placeholder="Select date" title="Select the date of fuel entry">

</div>


<div class="d-flex gap-2">

<button type="submit" class="btn btn-success">
Save Fuel Entry
</button>

<a href="/" class="btn btn-secondary">
Back
</a>

</div>

</form>

</div>

</div>

{% endblock %}
