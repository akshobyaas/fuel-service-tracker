{% extends 'trk/base.html' %}

{% block content %}
<h2>Edit Fuel Entry</h2>

<form method="POST">
{% csrf_token %}

Vehicle:

<select name="vehicle" title="Select a vehicle">

{% for v in vehicles %}
<option value="{{ v.id }}" {% if v.id == entry.vehicle.id %}selected{% endif %}>
{{ v.brand }} {{ v.name }}
</option>
{% endfor %}

</select>

<br><br>

Litres:
<input type="number" step="0.01" name="litres" value="{{ entry.litres }}" title="Enter litres">

<br><br>

Cost:
<input type="number" step="0.01" name="cost" value="{{ entry.cost }}" title="Enter cost">

<br><br>

Odometer:
<input type="number" step="0.1" name="odometer" value="{{ entry.odometer }}" title="Enter odometer reading">

<br><br>

Date:
<input type="date" name="date" value="{{ entry.date|date:'Y-m-d' }}" title="Enter date">

<br><br>

<button type="submit">Update</button>

</form>
{% endblock %}
