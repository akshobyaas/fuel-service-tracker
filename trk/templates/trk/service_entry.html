{% extends 'trk/base.html' %}

{% block content %}

<div class="container">

<h2 class="mb-4">Add Service Record</h2>

<div class="card shadow-sm p-4 col-lg-6 col-md-8">

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label for="vehicle" class="form-label">Vehicle</label>

<select id="vehicle" name="vehicle" class="form-select">

{% for v in vehicles %}
<option value="{{ v.id }}">
{{ v.brand }} {{ v.name }}
</option>
{% endfor %}

</select>
</div>


<div class="mb-3">
<label for="service_type" class="form-label">Service Type</label>

<input
type="text"
id="service_type"
name="service_type"
class="form-control"
placeholder="Example: Oil Change, Chain Service"
>
</div>


<div class="mb-3">
<label for="cost" class="form-label">Cost</label>

<input
type="number"
id="cost"
step="0.01"
name="cost"
class="form-control"
placeholder="Enter service cost"
>
</div>


<div class="mb-3">
<label for="odometer" class="form-label">Odometer Reading</label>

<input
type="number"
id="odometer"
step="0.1"
name="odometer"
class="form-control"
placeholder="Enter odometer reading"
>
</div>


<div class="mb-3">
<label for="date" class="form-label">Date</label>

<input
type="date"
id="date"
name="date"
class="form-control"
>
</div>


<div class="mb-3">
<label for="description" class="form-label">Description</label>

<textarea
id="description"
name="description"
class="form-control"
rows="3"
placeholder="Optional notes about the service"
></textarea>
</div>


<div class="d-flex gap-2">

<button type="submit" class="btn btn-warning">
Save Service Record
</button>

<a href="/" class="btn btn-secondary">
Back
</a>

</div>

</form>

</div>

</div>

{% endblock %}
