{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Offline — PitLog</title>
<link rel="stylesheet" href="{% static 'trk/css/style.css' %}">
<script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('pitlog-theme') || 'dark'); })();</script>
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-primary); padding:24px; }
  .offline-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-xl); padding:48px 40px; max-width:440px; width:100%; text-align:center; box-shadow:var(--shadow-card); }
  .offline-icon { width:64px; height:64px; background:var(--bg-input); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; }
</style>
</head>
<body>
<div class="offline-card">
  <div class="offline-icon">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <circle cx="12" cy="20" r="1"/>
    </svg>
  </div>
  <h2 style="font-size:20px;font-weight:600;color:var(--text-primary);margin-bottom:10px;">You're offline</h2>
  <p style="font-size:14px;color:var(--text-muted);line-height:1.7;margin-bottom:28px;">
    No internet connection detected. Connect to Wi-Fi or mobile data and try again.
  </p>
  <button onclick="window.location.reload()" class="btn btn-primary" style="justify-content:center;width:100%;">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    Try again
  </button>
</div>
</body>
</html>
